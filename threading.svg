<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 250" width="480" height="250" role="img" aria-label="Thread milling a bore on the left and thread turning a shaft on the right">
  <rect width="480" height="250" fill="none"/>

  <!-- ============ LEFT: INTERNAL THREAD MILLING ============ -->
  <!-- workpiece block (isometric) -->
  <polygon points="55,120 150,86 228,120 133,154" fill="#465666"/>
  <polygon points="55,120 55,182 133,216 133,154" fill="#2f3d49"/>
  <polygon points="133,154 228,120 228,182 133,216" fill="#3a4a58"/>
  <!-- bore -->
  <ellipse cx="141" cy="121" rx="32" ry="13" fill="#16222e" stroke="#29b6f6" stroke-width="1.6"/>
  <ellipse cx="141" cy="121" rx="23" ry="9" fill="#0f1720" stroke="#29b6f6" stroke-width="1.1"/>
  <ellipse cx="141" cy="121" rx="14" ry="5.5" fill="#16222e" stroke="#29b6f6" stroke-width="0.9"/>
  <!-- thread mill: shank + threaded head descending into bore -->
  <rect x="130" y="16" width="22" height="6" rx="2" fill="#8b9bab"/>
  <rect x="134" y="22" width="14" height="40" fill="#9aa9b8"/>
  <rect x="126" y="60" width="30" height="62" rx="3" fill="#ffb300"/>
  <path d="M126 70 l30 -6 M126 80 l30 -6 M126 90 l30 -6 M126 100 l30 -6 M126 110 l30 -6"
        fill="none" stroke="#9a6b00" stroke-width="1.6"/>
  <text x="141" y="238" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#90a4b8">Thread milling</text>
  <text x="141" y="234" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="0" fill="#90a4b8"> </text>

  <!-- ============ RIGHT: EXTERNAL THREAD TURNING ============ -->
  <!-- chuck -->
  <rect x="430" y="120" width="20" height="60" rx="3" fill="#2f3d49"/>
  <rect x="424" y="126" width="10" height="48" rx="2" fill="#3a4a58"/>
  <!-- shaft -->
  <rect x="262" y="128" width="170" height="44" rx="22" fill="#465666"/>
  <!-- chamfer at free end -->
  <path d="M262 150 l16 -22 M262 150 l16 22" fill="none" stroke="#2f3d49" stroke-width="2"/>
  <!-- external V-thread -->
  <g stroke="#29b6f6" stroke-width="1.5" fill="none">
    <path d="M286 128 l6 22"/><path d="M300 128 l6 22"/><path d="M314 128 l6 22"/>
    <path d="M328 128 l6 22"/><path d="M342 128 l6 22"/><path d="M356 128 l6 22"/>
    <path d="M370 128 l6 22"/><path d="M384 128 l6 22"/><path d="M398 128 l6 22"/>
  </g>
  <!-- turning tool: holder + insert at the cut -->
  <polygon points="372,210 410,210 391,176" fill="#ffb300"/>
  <rect x="384" y="172" width="14" height="9" rx="1.5" fill="#fff3d6" stroke="#9a6b00" stroke-width="1"/>
  <!-- chip curl -->
  <path d="M392 172 q-10 -8 -3 -16 q6 -6 -2 -12" fill="none" stroke="#cfd8e0" stroke-width="1.4"/>
  <!-- rotation arrow over shaft -->
  <path d="M278 116 a16 6 0 0 1 26 -1" fill="none" stroke="#90a4b8" stroke-width="1.4"/>
  <polygon points="276,110 280,117 285,111" fill="#90a4b8"/>
  <text x="347" y="238" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#90a4b8">Thread turning</text>
</svg>
